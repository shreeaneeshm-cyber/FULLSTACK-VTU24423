<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Spring MVC Home</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background-color:#f2f2f2;
}

.container{
    margin-top:80px;
}

a{
    display:block;
    width:200px;
    margin:10px auto;
    padding:10px;
    text-decoration:none;
    background-color:#4CAF50;
    color:white;
    border-radius:5px;
}

a:hover{
    background-color:#45a049;
}
</style>

</head>

<body>

<div class="container">

<h2>Welcome to Spring MVC Demo</h2>

<a href="/">Show String</a>
<a href="/person">Show Person Name</a>
<a href="/show">Show Person Details</a>

</div>

</body>
</html>
